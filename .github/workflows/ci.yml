name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + typecheck + test + build (includes the empty end-to-end
  #    /health request via supertest) ────────────────────────────────────────
  backend:
    name: backend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build shared contracts
        working-directory: shared
        run: npm ci --workspaces=false --no-audit --no-fund && npm run build
      - name: Install backend
        working-directory: backend
        run: npm ci --workspaces=false --no-audit --no-fund
      - name: Lint
        working-directory: backend
        run: npm run lint
      - name: Typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Test
        working-directory: backend
        run: npm test
      - name: Build
        working-directory: backend
        run: npm run build

  # ── Frontend: build (Next runs lint + typecheck during build) ───────────────
  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build shared contracts
        working-directory: shared
        run: npm install --no-audit --no-fund && npm run build
      - name: Install frontend
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: frontend
        run: npm run build

  # ── AI Risk Service: lint (ruff) + tests (pytest) on Python 3.12 ────────────
  ai:
    name: ai (ruff · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: ai
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: ai
        run: ruff check .
      - name: Test (pytest)
        working-directory: ai
        run: pytest -q

  # ── Soroban contracts: build + cargo test ───────────────────────────────────
  contracts:
    name: contracts (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Test
        working-directory: contracts
        run: cargo test

  # ── Database: apply migrations to Postgres + run the ledger-balance smoke test
  #    (proves the DB-level double-entry invariant rejects unbalanced writes) ──
  database:
    name: database (migrations · ledger balance)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stellartrust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stellartrust
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations
        run: |
          for f in infra/supabase/migrations/*.sql; do
            echo "Applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Ledger balance smoke test
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/supabase/tests/ledger_balance_test.sql
      - name: Phase 2 financial transition smoke test
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/supabase/tests/phase2_transition_test.sql
